name: Render Account Statement PDF

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apache FOP
        run: |
          sudo apt-get update
          sudo apt-get install -y fop

      - name: Generate PDFs
        run: |
          chmod +x generate-pdf.sh
          chmod +x generate-all-reports.sh
          ./generate-all-reports.sh

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: account-statements
          path: pdf/*.pdf
